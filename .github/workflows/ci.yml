name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_ENV: test
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}

jobs:
  # ── Validate ────────────────────────────────────────────────────────────────
  validate:
    name: Typecheck + Lint + Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages (required for typecheck)
        run: pnpm turbo run build --filter='./services/*'

      - name: TypeScript — typecheck all packages
        run: pnpm turbo run typecheck

      - name: ESLint — lint all packages
        run: pnpm turbo run lint

      - name: Prettier — format check
        run: pnpm format:check

  # ── Unit Tests ───────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Test with coverage
        run: pnpm turbo run test:ci

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          files: '**/coverage/lcov.info'
          fail_ci_if_error: false

  # ── Performance Benchmarks ───────────────────────────────────────────────────
  performance:
    name: Performance Budgets
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm turbo run build

      - name: Run benchmarks
        run: pnpm turbo run bench

  # ── Dependency Graph Validation ──────────────────────────────────────────────
  dependency-check:
    name: Forbidden Dependency Check
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify eventbus has zero internal deps
        run: |
          cd services/eventbus
          node -e "
            const pkg = require('./package.json');
            const deps = Object.keys(pkg.dependencies || {});
            const internal = deps.filter(d => d.startsWith('@noah/'));
            if (internal.length > 0) {
              console.error('FAIL: eventbus has internal deps:', internal);
              process.exit(1);
            }
            console.log('PASS: eventbus has zero internal deps');
          "
